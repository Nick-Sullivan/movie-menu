name: Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy:
    name: "Test and deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "ap-southeast-2"

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install_args: node rust terraform

      - name: Cache rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Run server tests
        run: mise run server:test

      - name: Cache npm downloads
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install client dependencies
        run: mise run client:install

      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}

      - name: Install Playwright browser
        run: mise run client:install:browser

      - name: Run client tests
        run: mise run client:test:ci

      - name: Cache terraform providers
        uses: actions/cache@v5
        with:
          path: .terraform-plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}

      - name: Create terraform plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Initialise terraform state (infra)
        working-directory: terraform/infrastructure
        run: terraform init

      - name: Apply terraform state (infra)
        working-directory: terraform/infrastructure
        run: terraform apply -auto-approve

      - name: Initialise terraform state (upload)
        working-directory: terraform/upload
        run: terraform init

      - name: Build client
        run: VITE_API_URL=$(terraform -chdir=terraform/upload output -raw worker_url) mise run client:build

      - name: Apply terraform state (upload)
        working-directory: terraform/upload
        run: terraform apply -auto-approve
