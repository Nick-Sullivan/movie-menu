name: Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build:
    name: "Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "ap-southeast-2"

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install_args: node

      - name: Initialise terraform state (infra)
        working-directory: terraform/infrastructure
        run: terraform init

      - name: Apply terraform state (infra)
        working-directory: terraform/infrastructure
        run: terraform apply -auto-approve

      - name: Initialise terraform state (upload)
        working-directory: terraform/upload
        run: terraform init

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: VITE_API_URL=$(terraform -chdir=../terraform/upload output -raw worker_url) npm run build

      - name: Apply terraform state (upload)
        working-directory: terraform/upload
        run: terraform apply -auto-approve
