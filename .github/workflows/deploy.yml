name: Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy:
    name: "Test and deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "ap-southeast-2"

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install_args: node rust terraform

      - name: Cache rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Run server tests
        run: mise run server:test

      - name: Install client dependencies
        run: mise run client:install

      - name: Install Playwright browser
        run: mise run client:install:browser

      - name: Run client tests
        run: mise run client:test:ci

      - name: Initialise terraform state (infra)
        working-directory: terraform/infrastructure
        run: terraform init

      - name: Apply terraform state (infra)
        working-directory: terraform/infrastructure
        run: terraform apply -auto-approve

      - name: Initialise terraform state (upload)
        working-directory: terraform/upload
        run: terraform init

      - name: Build client
        run: VITE_API_URL=$(terraform -chdir=terraform/upload output -raw worker_url) mise run client:build

      - name: Build server image
        run: mise run server:build:image

      - name: Apply terraform state (upload)
        working-directory: terraform/upload
        run: terraform apply -auto-approve
